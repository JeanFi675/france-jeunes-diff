<h1 id="%C3%A9dito">ÉDITO</h1>
<blockquote>
<p><em>Le Championnat de France Jeunes débarque en Haute-Savoie !</em></p>
<p>C'est THE rendez-vous de l'escalade jeunes en France. <strong>300 grimpeurs</strong> de 13 à 18 ans, l'élite nationale des catégories U15 à U19, vont en découdre sur notre mur pendant deux jours d'affrontements intenses. Objectif : décrocher le titre de <strong>Champions et Championnes de France</strong>.</p>
<p>Cette compétition, nous l'organisons main dans la main avec la <strong>FFME</strong> et le <strong>Comité Territorial Haute-Savoie</strong>. On a mis les petits plats dans les grands pour accueillir ces jeunes talents et leurs familles dans les meilleures conditions.</p>
<p>Et comme notre mur fête ses <strong>20 ans</strong> cette année... on a décidé de faire les choses en grand : écran géant, DJ et danseurs ouvriront le bal des finales !</p>
<p>L'entrée est <strong>100 % gratuite</strong>, viens vibrer avec nous !</p>
</blockquote>

<br>
<h2 id="le-d%C3%A9fi-un-marathon-vertical">[LE DÉFI] Un marathon vertical</h2>
<br>
<p>La route vers le Championnat de France est longue et impitoyable. Championnat départemental, championnat régional, demi-finales... c'est un parcours du combattant. À l'heure où vous lisez ces lignes, la sélection est peut-être jouée ou encore en balance. Mais une chose est sûre : forts de leur préparation hivernale, <strong>nos jeunes ne lâchent rien</strong>. Qu'ils soient qualifiés ou premiers supporters en tribunes, c'est tout un collectif qui pousse derrière eux.</p>
<br>
<h3 id="u15-la-rel%C3%A8ve-qui-envoie-du-lourd">[U15] La relève qui envoie du lourd</h3>
<br>
<p>La locomotive est lancée par <strong>Élie Tardy</strong> (3 podiums au Championnat de France combiné 2024 dont un titre de Champion de France en vitesse, Champion Régional en titre et 9ème du Championnat de France 2025 en difficulté) et <strong>Josuah Veyrat</strong> (solide 7ème régional l'an dernier). Mais la force de frappe est collective : <strong>Lou Guyot</strong> et <strong>Jade Castagna</strong> complètent cette équipe soudée. Présentes sur tous les fronts, elles prouvent à chaque entraînement que la progression, c'est contagieux !</p>

<h1 id="le-dico-du-spectateur">LE DICO DU SPECTATEUR</h1>
<br>
<h3 id="pour-comprendre-ce-dialecte-tribal-et-briller-%C3%A0-la-buvette">Pour comprendre ce dialecte tribal et briller à la buvette !</h3>
<br>
<div class="phase-card rot-p1">
<div class="rule-header">LES PRISES (Ce que l'on agrippe)</div>
<p><code>Le Bac</code> La prise canapé, grosse et rassurante. Le seul endroit de la voie où tu peux reprendre ton souffle (et ta dignité).</p>
<p><code>La Réglette</code> L'inverse du bac. Une petite barrette horizontale, à peine assez profonde pour y poser le bout des doigts.</p>
<p><code>L'Aplat</code> Une prise toute ronde, fuyante, sans aucun rebord pour accrocher les doigts. C'est comme essayer de tenir un ballon de basket à une main.</p>
<p><code>Le Volume</code> Ces grosses structures géométriques (pyramides, cubes...) vissées sur le mur qui changent son relief.</p>
</div>
<div class="cols2">
<div>
<img src="./brochure_files/06-grimpeuse.jpg" class="ad-img rot-m1" width="75%">

<div class="rule-header">LA GESTUELLE (Le style et les mouvements)</div>
<p><code>Le Drapeau</code> Le grimpeur tend une jambe dans le vide, croisée derrière l'autre jambe d'appui. Ça évite de tourner comme une porte de saloon.</p>
<p><code>La Lolotte</code> Tordre son genou vers le bas de façon inquiétante pour se coller au mur. Ton orthopédiste déteste, mais tes bras adorent.</p>
<p><code>Le Jeté</code> Mode kangourou activé. Tu lâches tout et tu sautes vers la prochaine prise en priant pour que ça tienne.</p>
<p><code>Le Crux</code> C'est LE passage clé. Le moment le plus difficile de la voie.</p>
</div>
